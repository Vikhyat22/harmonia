services:
  lavalink:
    build:
      context: .
      dockerfile: Dockerfile.lavalink
    container_name: lavalink
    restart: unless-stopped
    ports:
      - "2333:2333"
    environment:
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_SERVER_PASSWORD}
      - YOUTUBE_OAUTH_REFRESH_TOKEN=${YOUTUBE_OAUTH_REFRESH_TOKEN}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
    volumes:
      - lavalink_plugins:/Lavalink/plugins
    healthcheck:
      test: >
        sh -c 'curl -fsS -H "Authorization: $${LAVALINK_SERVER_PASSWORD}"
        http://localhost:2333/version >/dev/null || exit 1'
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

volumes:
  lavalink_plugins:
